body:
  text: 韓集㸃勘别集類一唐提要臣等謹案韓集㸃勘四卷國朝陳景雲撰景雲即撰通鑑胡注舉正者是編因廖瑩中世綵堂所注韓集舉正其誤因彚成編卷首注曰校東雅堂本以廖注為徐時泰東雅堂所翻雕也末有景雲自跋稱瑩中粗涉文義全無學識其博采諸條不特遴擇失當即文義亦多踈舛今觀所校考據史傳訂正訓詁刪繁補闕較原本實為精密如别知賦之一旦為仇證以爾雅元和聖德詩之麻列證以李白夢游天姥詩城南聫句之疆氓證以周禮鄭注梁國公主挽歌之厭翟證以毛詩鄭箋師說之句讀證以經典釋文送韓侍御序之所治證以魏文帝與吳質書祭李使君文之驚透證以揚雄方言左思賦烏氏廟碑之立議證以漢書顔注太原郡公神道碑之耆事證以王安石文劉統軍墓志之父訟證以漢書段熲傳太傅董公行狀之其子乃證以唐書李萬榮傳以至郾城聮句之諛噱當為庾噱證以李藩傳進學解之守正當為宗王證以新唐書及文粹皆援據精確他如引赤藤杖歌證南宫不止稱禮部引唐志五嶽四瀆令證廟令老人引德宗祔廟髙宗已祧證諱辨之治字亦具有典據而於時事辨别尤詳可稱善本惟尸子先見公羊傳而云出漢書稍為疏漏又次潼關先寄張十二閣老詩忽參宋人諧謔一條非惟無預於校讐乃併無預於韓集殊乖體例耳乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:df175deefb687ccf5d20d9193337c27c51cf88c4d44533ab7ca2389610d5f9bf
