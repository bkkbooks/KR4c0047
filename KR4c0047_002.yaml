body:
  text: 韓集㸃勘卷二長洲陳景雲撰石鼓歌歌中叙元和初為博士嘗告祭酒以石鼓所在勸其移置太學惜未之從故有中朝大官二句歐公集古録云石鼓在今鳯翔孔子廟先時散棄於野鄭餘慶始置於廟按餘慶帥鳯翔在元和九年乃韓子作詩後事竊因歐公之言詳考之知韓公前此所告之祭酒即餘慶也公為博士之歲餘慶以故相為祭酒故曰中朝大官餘慶為祭酒三月旋拜尹洛之命意其蒞官日淺故公所請未及施行耶至遷鎮鳯翔即有移置孔廟事蓋理公前語也然則石鼓之得久存於世不至銷蝕埋沒如公詩所嘆者固出自鄭相收拾之力而亦公在太學有以啓之耳先儒作石鼓考者如王厚之鄭漁仲諸公皆援据該博而初不言鳯翔移置事自公發其端故表而出之題炭谷湫祠堂匣裏雌雄鳥按鳥當作劍送陸暢歸江南名以能詩聞注唐史公主傳無雲陽主疑非雲安即岐陽之誤暢長慶初入江西廉使王仲舒幕府至太和末以前鳯翔少尹預誅鄭注事見唐史送劉師服師服歸後復入京師元和十二年駙馬都尉于季友坐居喪宴飲得罪師服以與同飲笞四十流連州貽持令名二句惜其不能誦之終身乃至犯刑而辱親也調張籍刺手拔鯨牙按刺手當與送窮文捩手覆羮同義注誤寄崔立之首句注按西城謂寓都城西耳詩中明言客居京城也藍田在都城東南不當言西雪後寄崔丞詩云藍田十月雪塞關我興南望愁羣山尤可證也注非不敢捩眼窺注前說是送窮文捩手覆羮可證詩話一條當削視物隔䙰褷下注澄字謂唐人令狐澄本即上文姚令威所據唐本是也詳見方氏舉正澄桂管廉使定之孫相國楚之從孫附見舊史楚傳乾符中歷中書舍人别見新史藝文志又舊史楚傳後附子綯及孫滈偶滈下衍一澄字新史世系表及藝文志遂誤以澄為楚之孫綯之子方氏亦沿其誤澄所著有貞陵遺事見新志又嘗書其從祖楚白樓賦見趙氏金石録咎責塞兩儀注乃魏道輔語然福不盈眥禍溢於世此班固賔戲之文又魏人章疏所本道輔語猶未詳也觀名計之利注按觀之名計之利莊子雜篇中語朱子偶失記耳月蝕詩按玉川月蝕詩洪景盧言指宦官吐突承璀用事見容齊續筆其說為長孟生詩窅默咸池音按蘇子容詩孟郊篇什况咸池自注云唐人題孟郊詩三百篇為咸池集取退之詩義又劉貢父詩話亦云孟有集號咸池僅三百篇至宋次道跋東野詩却云蜀人蹇濟用退之贈郊句纂成咸池二卷一百八十篇與蘇劉之說不同未詳孰是無為久滯淫按國語底著淫滯賈逵注淫久也此蓋倒用與上參差同示爽強顔班行內注按題下注近之觀名科二聨乃已登科入使府者則詩當作於長慶中非元和間知制誥時也後注與前相戾又凡列朝班者皆可云在班行內非典誥之稱後說尤無據贈别元十八題注按樊說是特語猶未詳白序作於元和十二年正裴行立帥桂時大林寺在江州廬山元十八嘗搆溪亭於山之東南見樂天詩又樂天有送元十八出廬山從事南海詩蓋同游大林後尋赴嶺外使幕矣本從事桂林而云南海者殆以桂林亦嶺南五管之一故可通稱耶英英桂林伯注按伯謂九州之伯左傳云五侯九伯是也注未分曉已覽贈子篇注按注說是也栁序稱元生之為學恢博而貫統韓贈詩第五篇即申言序意耳但考子厚送僧浩初序云近李生礎自東都至退之寓書曰見送元生序云云退之在東都送李生還湖南乃元和四年事則見栁送元序必更在其前見序與貶潮相去已踰十載不當止云想風采三年疑三年二字傳録有誤栁序作於永州方送元生為湖嶺之游其栖止廬山蓋南游回棹後事也嶷嶷桂林伯注按歐陽生哀辭云容貌嶷嶷然此句蓋亦稱其容貌之莊至史記其德嶷嶷乃五帝本紀中稱帝嚳語若引以頌美臣下不倫甚矣别趙子婆娑句注王衍當作王愆期事詳晉史陶侃鎮荆時衍死久矣除官赴闕湓城去鄂渚陸游入蜀記云自江州至鄂州七百里泝流雖日得便風亦須三四日韓詩云湓城去鄂渚風便一日耳過矣按通典尋陽西南到江夏六百里江夏鄂州理所南山有高樹題注下篇非為李宗閔作方氏辨之甚詳語見下篇題下此注及下篇三字與後篇當是為宗閔作句並當削詩話尤贅猛虎行出逐猴入居按猴方本作猚朱子辨之然猴字亦竊疑未安蓋猴非虎敵明甚若入居其穴乃劘虎牙而餧之肉耳虎何憚而不敢歸穴乎猴猚二字俱傳録有誤奉酬盧給事按東坡謝賜御書詩云袖有驪珠三十四蓋化公此詩二語為一也證以坡詩方說之誤益明南內賀朝歸按唐南內興慶宫非人主正衙朝賀地據新史穆宗母郭太后居興慶宫朔望三朝穆宗率百官詣宫門上壽則此南內朝賀乃朝太后也此詩疑公在穆宗朝除京兆尹與中丞李紳爭臺參後作唐人以中丞居風憲多呼為法吏詩云法吏多少年磨淬出圭角法吏自指中丞也又皇甫湜作公墓志其中叙爭臺參事斥紳為佞臣有􅀢其鋩之語詩所謂圭角殆猶志之言鋩均指紳之得君勢盛也據實録京尹之除在長慶二年六月其復除兵部侍郎則是冬十月觀篇首秋曦句則詩以秋日作正臺府不協移牒紛然時也致官九列齊舊注以此詩為公官庶子日作非也官庶子在元和中朝南內乃長慶間事前後了不相涉又自舍人改庶子乃自要職徙閒官非貶也此詩蓋作於貶潮還朝後三黜謂為御史郎官及刑部侍郎時凡三黜官耳况明言致官九列齊庶子之官不得齊於九列則注說之誤益明矣著籍朝厥妻命婦亦入朝太后注未明悉雜詩題注按第七卷雜詩題下注公時為右庶子元和十一年作與譴瘧鬼題下注元和十三年為刑部侍郎時作二說皆未有確據又第十卷中閒游題下語亦然皆當削譴瘧鬼出汝去莫違按出當從宋閩本作咄與張十八同效阮步兵辟如兔得蹄注按得兔而忘蹄本莊子語王弼周易略例引之繫辭無此文城南聨句禮鼠拱而立注按文子曰聖人師拱鼠制禮故曰禮鼠杜詩野鼠拱亂穴又注陸機當作陸璣浙玉炊香粳注說是折稌見內則尤古浙作折之明證蓋浙與淅亦音異而義同耳又魏文之文當作武趙燕錫媌娙注按娥字說文云帝堯之女舜妻娥皇字也秦晉謂好曰娙娥此注倒其文據漢書娙娥武帝所置後宫位號顔師古注美好貌釋韓詩娙字顔注可與說文兼引運田閒彊氓按周禮以彊豫任氓鄭注彊豫謂民有餘力復豫之田若餘夫然彊氓本此納凉聨句掃寬延鮮飈按此下脫注一條誤刋入後秋雨聨句颼飀卧江汰下當改正征蜀聨句填隍􅢼㑻傄注玉篇㑻傄健也蓋言填隍士之奮力戰恤時銷洗恤當從宋蜀本作血雨中寄孟刑部按舊史簡自倉部員外郎遷司封郎中新史所謂他曹乃司封非刑部蓋自戶曹遷吏曹故曰他曹也又韓子志李干墓文中稱簡為工部尚書簡歷此官亦未見於史蓋與不著其除刑部同則史之所略多矣鬭場再鳴先按再鳴者謂幾道登第後又擢詞科也鄭羣墓銘中有再鳴以文句與此語意正同逺游聨句題注按注謂遠游即東野役於江南時其說似是而非蓋役於江南乃赴溧陽尉任役謂吏役也遠游在初春而歸期訂晚秋豈有赴官而春去秋還者又詩中歷叙吳楚諸地蓋時將為湖嶺之游故云爾觀東野集中有過彭澤次沅湘及連州吟諸詩殆皆此游作亦可略見游跡之逺矣取之詎灼灼按取之劉貢父詩話作前知為是郾城聨句此年名作噩注按元和二年當作十二年宫娃分綽約注按風俗通當作通俗文親交獻謏噱按謏廣韻蘇奏切怒言也與下噱字義相反不應連用宋杭蜀本皆作諛又與上句諂字意復亦恐非是疑廋字之訛廋辭見國語又唐書李藩傳王仲舒與同舍郎置酒邀賔為俳說廋語相狎獻廋噱者殆亦同此耳五狩朝恆岱按五嶽獨言朝恆岱者因二嶽在恆鄆二州境時王承宗李師道皆未納土故也雪下收新息注詩以晚秋作至雪夜入蔡乃是冬十月事注不當引義魚招張功曹題注按詩作於貞元二十年春至陽山後乃俟新命於衡陽前一年也祭李郴州文中叙投義魚詩事在俟新命之先而謝郴州寄紙筆詩又在投義魚詩之前謝詩有虞卿正著書句蓋方在謫居故云爾益可證是詩為陽山時作公以是冬與張署會宿界上而義魚在春故有思我友憶同僚之語而招之來邑也舊注非木居士按題木居士詩洪譜不繫某年然譜以郴州祈雨及郴口諸詩並繫之乙酉而木居士廟在衡州屬邑公自郴赴衡嘗憩其地故留題云爾是時羣邪之勢猶盛正公他詩所謂伾文未揃時也二詩蓋專指伾文言之栁子厚既坐伾文黨譴逐後與人書追叙伾文始末云素卑賤暴起領事射利求進者填門排户誦公詩而論其世正可引栁以注韓也次篇前二句申言伾文寒微暴貴出自糞土而驟升雲霄也當二人勢盛時其黨互相推奬有伊傅管葛之目伊傅殆指伾文而管葛則劉栁輩標榜之詞也後二句殆深斥當時之大言夸飾謂二人可伯仲伊呂之流歟伾文既揃後三十餘年而夢得作子劉子自傳猶盛稱其才謂有逺祖景略風是直取燼餘之木復雕畫之也喜雪授簡慕前規注謝靈運雪賦按靈運當作惠連入關咏馬題注舊注誤方氏舉正亦以此詩為元和改元西歸日作亦誤也公元和中自河南令入為職方員外郎因前過華州時見華隂令栁澗事上疏論之坐是下遷博士公詩疑緣此而作華州乃入潼關孔道也公先以言事逺謫回翔久之方有省郎之召乃復以抗直左官宜不能無慨於中故以馬之一鳴輒斥自比耶若從江陵還朝時公年未踰强仕不應有歲晚力微之慨矣樊澤之曰歲晚力微不應鳴也其說是蓋不應鳴而鳴斯為妄矣唐人詩文中凡止稱關者皆謂潼關至藍田武關則必繫關名以别之即公集中亦然可參考也李林甫欲絶言路有立仗馬一鳴輒斥語事見本傳一鳴二字本此梁國公主挽歌移封大國新按公主始封普寧元和中徙永昌及薨追封梁國自郡封進國封故云爾龍轜非厭翟按周王姬下嫁車服下王后一等乘厭翟車見詩鄭箋歷代因之唐制亦爾觀新史趙國公主傳可見和崔舍人咏月重門限禁扃按崔時以翰林學士兼舍人方供奉禁闥故有重門句然舍人內直亦在禁中公掌制日嘗有仙郎宿禁中語咏雪贈張籍紛紛碎若挼按挼有乃禾素回二音此當從素回切廣韻曰擊也如從乃禾切不惟乖韻義亦不協矣酬王二舍人雪中見寄按題下注皆方氏語其說良是至涯為舍人本傳略之二語初疑其未諦按王適志文云中書舍人王涯獨孤郁考二人本傳皆止以郎官知制誥未嘗官舍人而志文與詩題云爾者蓋唐代凡知制誥官例得稱舍人以制誥本舍人典之而以他官兼知即職與之同故亦得稱之如劉夢得哭郁詩亦稱舍人此尤可證然韓集中祭虞部張員外文文苑英華詳具年月日下并列同祭姓名六人首云中書舍人王涯次云考功郎中知制誥韓愈未嘗以二人俱掌外制並稱舍人則方云涯為舍人而本傳略之者其說亦是也韓子赴江陵途中有寄贈王二十補闕詩即涯也又有次石頭驛寄王十中丞詩則仲舒也二王姓同行異即見本集至王璠呼涯為二十兄又别見唐史涯傳無為舍人事而仲舒官舍人詳見碑志及史傳或本題下誤注仲舒蓋由此又栁子厚集中稱仲舒為舍人獻𢎞農公詩自注而仲舒除此官在子厚殁後此又知制誥得稱舍人之一證也送侯喜如今便别長官去按一官之長曰長官漢孔氏書傳及鄭氏詩箋中皆有此稱其來久矣奉和盧四兄元日朝回戎服上趨承北極按唐制朝日百官班定金吾將軍先出班報平安戎服句謂此送李六協律宋諸本題下皆注翺字殆因韓子代張籍上李浙東書中有李協律翺故耳然翺之行七非六也即見本集與楊子書此誤正與以王舍人為仲舒同贈張十八助教題注按四門國子兩署也博士助教兩官也注合而言之殆近麞邉鹿鹿邉麞矣和席八韻題注按席謙與杜子美同時名見杜集與韓子相去殊逺又謙本道士注家之謬有如此者直當削去何必存而辨之公時與䕫同掌外制故有倚玉一聨或作市誤也及公貶潮而䕫猶在右掖公之謫詞即䕫所草廣宣上人頻見過按廣宣以詩召入供奉內道場有集名紅樓皆應制之作緣此頗怙恩挾勢干謁公卿嘗私傳禁中語於韋右丞貫之貫之叱而出之公詩意亦猶是也太安池舊注疑太安池即安樂公主定昆池其說近之下公主當年一絶即咏太安池耳游太平公主山莊一題諸本無之為是唐本太安池下注闕字殆偶逸是詩也據雍録定昆池在長安西南十五里故有臺榭壓城闉句又朝野僉載言定昆池方四十九里直抵南山尤可作第二聨注或疑游太平公主山莊一題當繫是詩後下注闕字亦可通閒游子雲祗自守注安帝時丁傅董賢用事按安當作哀和李司勳過連昌宫題注遺老即謂開元遺老時上距開元六十年當日遺民宜尚有存者如元微之連昌宫詞亦借宫邉老人立言是也詩意蓋謂昔年父老幸值元和中興皆欣欣復見太平之盛惟安樂而思終庶克紹開元之治免蹈天寶之覆轍耳宫雖置於顯慶而開寶間車駕幸東都屢駐此宫故公詩云爾舊注皆未得其解次潼關先寄張十二閣老中興遺史紹興元年三月張浚自陜西回蜀宣司幹官郭奕有詩云秦山去盡蜀山來日照關門兩扇開刺史莫辭迎候逺相公新送陜西回蓋改韓詩以誚浚富平喪師事是可採入拊掌録也次潼關上都統相公題注按淮西之平裴度以宰相督戰李商隱韓碑詩所謂腰懸相印作都統是也舊注以韓𢎞當之誤桃林夜賀晉公題注按桃林在潼關東詩蓋作於次潼關前上都統詩中冠蓋相望句即謂在桃林遇銜詔西來者送李員外院長分司東都韓子從晉公還都後擢刑部侍郎叙平蔡功也同時幕僚如馮宿李宗閔皆遷官獨正封不得例遷且反奉分司之命是必有泥其進者故腹聨云爾正封後歷中書舍人有詩名牡丹一篇尤為時傳誦見松􅖠雜録元日酬蔡州馬尚書按蔡州疑當作華州舊史憲宗紀十三年十一月以華州刺史令狐楚充河陽節度使十四年三月以華州刺史馬總充鄆濮曹等州觀察使則總之除華州當即在十三年冬紀偶略之而本傳云十四年自忠武改華州四字蓋三字之誤耳四年元日總正在華公於都下酬其去年元日在蔡所寄詩故中有三峯之語答道士寄樹雞注龍城雲仙二録新舊史藝文志皆無之洪容齊力斥龍城録為妄書而云或以為劉無言所著至朱子語類及張邦基墨莊漫録中則謂二録皆王銍性之僞撰按無言名燾湖州人元祐三年進士有文譽東坡嘗和其詩銍亦北宋末名士陸放翁深推其記問該洽而生平好撰僞書欺世識者嗤之則洪張二說似朱張尤為得實矣容齊又嘗言孔傳續白氏六帖採托唐事殊有功而悉載雲仙録諸事自穢其書雲仙散録馮贄撰按孔帖兼載二録而容齊獨舉雲仙蓋偶遺其一要之此二録皆底下惡書也注家不辨而俱引之殆亦穢韓子之詩矣左遷至藍田關雲橫秦嶺按班固西都賦曰於是晞秦嶺通典云在藍田界次鄧州界早晚王師收海嶽按海嶽之地皆在鄆部時鄆寇將平故云爾先是淮西甫平即有赦令公亦冀平鄆之後當例降德音可遂因此內移耳詩以初春作因有雷雨句及仲春而海嶽收矣緣降赦在秋故至冬始自潮移袁也晚次宣溪題注此赴潮過韶作公以是春三月至潮安得入夏尚在韶乎注非題秀禪師房按題驛梁詩題云貶潮州刺史乘驛赴任其時方為嚴程所迫塗中山水皆未暇游眺故後日移袁過韶寄詩韶守有欲借圖經開看佳處之語則到僧家把漁竿必非赴潮時事定量移後過其地而留題也後詩題下注尚未考及此韶州留别張端公江總虞翻按南史江總傳梁元帝徴為始興內史始興即韶州以江比張蓋用當州故事又吳志虞翻傳孫權徙翻交州裴注引翻别傳有自恨骨體不媚犯上獲罪當長殁海隅諸語公自以直諫謫潮與翻之徙交同又潮州地亦漢交郡所轄故以翻自比舊注未明游西林寺題注魏𢎞下脫簡字白樂天游大林寺序可證𢎞簡見貞元末有墓志在栁子厚集其游廬山蓋攝官江州刺史時也又長慶初有樞密內臣魏𢎞簡乃姓名偶同者自袁州還京歲暮難相值一聨按公以冬日次安陸歲已暮矣然末聨又非專言時序也韓詩歲聿其暮薛君章句曰暮晚也謂君年歲已晚詩意本此蓋公早歲與隨州同佐汴幕是時舊寮多逝僅存二人故深喜晼晚相值之難耳合後寄隨州詩觀之義益明矣雨中寄張博士歲晚偏蕭瑟按觀雷頻以下三句則時非冬日可知兼觀白樂天和篇中有葉濕蠶病語蓋苦雨在初夏明矣落句歲晚之義與寄周隨州馬僕射二詩中歲暮歲晏同楚辭及年歲之未晏兮正公所本也奉和張侍郎再領須句國注按衍鄆之二字東平郡名須昌其屬邑唐之鄆州即晉東平郡也通典云鄆州古須句國似尤簡宜當採之仍遷少昊司馬總始以檢校禮部尚書鎮天平及召入未至復令還鎮加檢校刑部尚書故有是句司寇秋官秋月其帝少昊故云爾又天平屬邑曲阜本少昊之墟此句蓋雙關再鎮天平意注未明悉早春與張十八博士題注令狐澄本作三弟亦非楊嗣復行六非三也見白樂天集嗣復後入相唐史有傳澄生長貴胄而於近時宰輔亦偶未悉其行次足知考訂之難此諱行録之可資採證也館閣書目諱行録一卷以四聲編登科進士族系名字行第官秩及父祖諱主司名氏起興元二年盡大中七年其書出於唐季新史藝文志作諱行略宋志作録至撰書人姓名則二志俱逸之矣行户郎反或讀本字非送桂州嚴大夫飛鸞不假驂按驂鸞二字本江淹别賦至范至能帥桂林著驂鸞録則又取韓詩語奉和李相公題蕭家林亭題注按遇本作遘避高宗嫌名易之非誤韓集㸃勘卷二
