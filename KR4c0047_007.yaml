body:
  text: 文道先生傳先生諱景雲字少章吳中人也世為常熟名族稱河東陳氏曽祖天麟始遷郡城祖明義明季避寇尹山偕里中李灌園侍御遂寧李如石明府結蓮社之契號稱長者父治昌慷慨尚義先生自幼善讀書就傅吳太守綺家太守竒之嘗舉同孰兒所課輒能背誦蓋已耳熟之矣稍長屬文宿儒器重湯文正公斌巡撫江南試士拔置第一繼從何學士焯講求通儒之學學益大殖學士嘆曰昔朱晦翁呼蔡季通為老友余愧晦翁而子實季通也尋補縣學生康熙癸酉應京兆試假館王文靖公熙第諸公重其名咸願與交先生峻謝不事投謁既不售歸再至京館藩邸以道自重三載復辭歸以母老不出藩邸再遣使敦促漕帥某公命淮安守造廬延請俱弗赴乃益窮究經史參互考訂丹黃甲乙寒暑罔間其汲汲於學猶水火之於人不可一日缺凡古今載籍洞悉源委貫串靡遺於地理典制尤極研晰即丁字部書莫不關覽於前明事迹更若身列其間燭照而數計也為文精核而有體要著文集四卷讀書紀聞十二卷綱目訂誤四卷兩漢舉正五卷韓栁點勘八卷羣經刋誤四卷文選舉正六卷通鑑胡注舉正十卷紀元要略二卷皆能發前人之覆為後學津梁有何學士所不逮者學士每以疑義問先生先生曰是出某書某卷第幾頁幾行閲之無不合問輒如響應以是服其博聞強識云秉性孝友與人以誠外和而內剛名高而迹晦為江左儒林之宗晚歲杜門足絶城市朝野望之巋然既卒故人門弟子徴貞曜文表之義私諡曰文道先生贊曰國朝通儒首稱顧徴君炎武厥後江表文獻獨推先生蓋有道而能文實徴君之伯仲也余少慕先生及與其子黃中舉詞科得聞先生論議益嘆其學之閎深黃中學行超卓有國士風古稱碩儒有後其信然哉其信然哉年家子仁和沈廷芳拜撰
