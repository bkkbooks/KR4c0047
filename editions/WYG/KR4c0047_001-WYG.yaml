body:
  text: 韓集㸃勘巻一校東雅堂本長洲陳景雲撰李序教人自為注韓子作樊宗師墓銘云惟古於詞必已出降而不能乃剽賊序所謂教人自為者正訓以詞必已出耳為當如字讀注與音並非注論語十巻張水部祭韓子詩魯論未訖注手跡猶微茫則此云十巻者乃未成之書也今所傳論語筆解出後人偽託目録祭文中祭虞部張員外後脫祭河南張員外一題又祭滂文後衍祭張給事一題巻首宋莒公語馮元諡章靖以博洽稱宋史有傳莒公雅重之故校韓集特從馮本感二鳥賦觸白日之隆景景古影字時方仲夏故曰隆景雖家到而户説二句指光範上書不遇事離騷衆不可戸説兮孰云察余之中情公語本此或作户曉者非篇末注引歐公語結句明云無羡斯類而歐公乃以不過羡二烏光榮議之非篤論也復志賦將就食於江南注全採洪譜之文但多貞元元年四字按歐陽詹哀辭云建中貞元間余就食江南則非至貞元元年始避地江左也此四字當删去閔已賦題注公之去徐在府主未薨之前外集有題李生壁文可証非因府䘮而罷也本傳有才高數黜官語盖謂貞元末由御史黜官至元和初自謫籍召為博士久之又從省郎下遷也此賦作於貞元中在公從事使府之後未除朝官之前晁説失之咸通本乃咸通中中書舍人令狐澄藏本第五巻寄崔立之詩視物隔䙰褷下注引澄本即此本也别知賦題注按公與崔羣書貞元十八年也書云僕自少至今從事往還朋友間一十七年則公之取友天下當自貞元二年入都之歲始也是賦作於二十年歲行猶未滿兩周故曰將也注非知來者二句言此别之後良友既不可以頻得而遷客又未離謫地故申之以倚郭郛云云也舊注解來者未切蔓引論語尤可削斯百一而為収文粹作斯一旦而為仇按爾雅釋詁云仇匹也詩與子同仇一旦為仇猶言傾盖如故也似作仇字其義獨長而諸本未採元和聖徳詩題注按序云臣日與羣臣序立紫宸殿陛下親望穆穆之光則此詩必非分教東都時作也所在麻列按麻南宋初蜀人韓仲韶本作森朱子之説盖暗與舊本合特偶未採及耳然太白夢游仙姥詩仙之人兮列如麻則作麻列亦似有據分卒禁禦注神策京師行營按師當作西區外句注鎭州常山縣按縣當作郡滌濯剗磢句注詩勿翦韓詩作勿剗見經典釋文此注所本南山詩海浴褰鵬噣注或作騫之騫當作鶱爛熳堆衆皺注朱子言此蜀本之誤者當謂嘉祐中蘇溥刋本上言方從蜀人韓仲韶本則南宋初臨卭韓醇所刋本也盖石蟇之注雖出於韓而字之從􅀈則嘉祐蜀本已然故特分别言之耳又沈元用名晦錢塘人崇寧六年進士第一人宣和中甞刋韓栁集後入金曽再應舉登第歸朝歴官徽猷閣學士將歸操題注聞殺鳴犢作鳴上當從蜀本増竇字狄之水兮注與清水合沛瀆按沛當作泲别鵠操題注鵠與鶴本一字古人皆通用秋懐詩題注按詩乃元和初自江陵掾召為國子博士時作行狀云時宰相有愛公者將以文學職處公有争先者搆飛語公恐及難求分司東都是詩中有云學堂日無事盖方官國子也又云南山見高稜則猶未赴東都也至語穽心兵諸語其在已聞飛語後歟更以釋言篇參証公元和元年六月進見相國鄭公後數日即有為䜛於相國之座者則是秋正公憂䜛畏譏時也彼時何卒卒注司馬相如當作司馬遷汲古得修綆注莊子外篇綆短者不可以汲深荀語本之注自當引莊赴江陵途中將疑斷還不注蔡説非誤洪譜自疎耳方氏増考年譜辨之詳矣按公岳陽樓詩云前年出官由此禍最無妄姦猜畏彈射斥逐恣欺誑又祭張署文云彼婉孌者實憚吾曹側肩帖耳有舌如刀皆斥王韋之黨非謂李實也苕溪一條當删昨者京師至京師當從蜀本作京使岐山下二首題注據唐史程昔範敬宗初官拾遺為宰相李逢吉私人名在八闗十六子之列則昔範乃名非字也北極贈李觀注題下注已見前巻重雲篇此複出當删此日足可惜假道盟津注即盟津也盟當作孟東西出陳許東西當從宋閩本作東南按公始至徐徐帥館之睢上至秋方辟為從事詳見與東野書中注家自失採遂誤以為初至即授幕職也此詩乃未為從事時作故喜張之來有連延三十日晨坐達五更之語若已入使院則方晨入暮歸安得此閒適耶合全篇細讀之舊注之疎益見矣淮之水舒舒時送籍返和州故有淮水楚山二句和隸淮南又楚地也醉贈張秘書性情方浩浩東坡文見客舉杯徐引則吾胸中為之浩浩焉又題畫詩聚蚊金谷是何人皆本公詩語法言淵騫篇貨殖曰蚊此蚊字所本阿買不識字注或問阿買是退之何人按或問下脫魯直二字此必其子姪小字句乃韓仲韶注既引趙説此注複出當删送靈師梟盧叱回旋注按晉史劉毅擲得雉大喜曰非不能盧不事此耳舊注删改本文殊晦澁不可解又誤晉作宋千尋墮幽泉注尋或作潯按潯與尋同兩潯字並當作潯見説文開忠二州牧按開牧未詳忠牧盖謂李吉甫也吉甫以貞元中自郎署左官於外及在忠州又六年不遷故曰失職是詩作於貞元二十年而二牧之贈僧詩則又在前觀下昨者句可知矣落落王員外注戸部當作吏部縣齋有懐風雨靈臺夜謂官四門博士也漢光武立明堂辟雍靈臺號三雍宫誰為傾國媒注李延年傳漢武帝歌按傳當作侍何能一戰霸注按公馬少監誌云始余初冠應進士貢在京師後五六年吾成進士去而東遊則貢在京師者乃未成進士以前事至登第後上宰相書則自稱前鄉貢進士矣此注貢於京師四字當削何用畢婚嫁注後漢向平字子平按上平字當作長合江亭范石湖驂鸞録曰合江亭今名緑浄閣取韓詩緑浄不可唾句盖石湖赴桂林時過此而目覩其懸牓也邦君實王佐句宋本下注故相齊映所作老郎一聨下注宇文郎中炫又増其制君侯一聨下前刺史元澄無政廉使楊公中丞奏黜之朝廷遂用鄒君此考異所謂篇内三處注文也按此三條定公自注之文刋本誤以為出於後人而削之題下注亦止採二條尚遺其一宇文炫官終刑部郎徳宗欲復用盧杞炫時為拾遺與同官陳京等力争而止風節偉矣陪杜侍御游湘西寺題注湘西觀察使按湘西當作湖南指摘困瑕垢按公自陽山遇赦僅量移江陵法曹盖本道廉使楊憑故抑之贈張功曹詩所謂州家申名使家抑坎軻祗得移荆蠻是也時韋王之勢方熾憑之抑公乃迎合權貴意耳詩中椒蘭絳灌自斥韋王而指瑕摘垢盖謂使家之抑也岳陽樓朝過宜春口注按公是時方自潭抵岳以趨荆南不應過袁州之境觀下夜䌫巴陵洲句則宜春口盖在岳州之南乃洞庭中小洲渚名也注承洪譜之誤擢拜識天仗謂御史之擢也唐制三院御史有缺悉由御史大夫及中丞薦授貞元之季御史臺久不除大夫皆中丞專其事公之入臺時李汶為中丞盖由汶薦也時同官中名最著者如栁宗元劉禹錫李程張署等俱汶所薦故宗元祭汶文云慎擇寮吏必薪之楚斯篤論矣時公先貶官於外故不預祭耳惜史逸汶傳而薦公事尤失傳當以宗元祭文及新史王播傳參考自可得之但懼失宜當當謂奏當也奏當見漢書師古注當謂處其罪時公量移江陵法曹故云爾言惟恐司刑而不得其平也送文暢昔在四門館注按博士上衍國子二字觀題下注自明少小學城闕按詩子衿刺學校廢也少小句盖言此僧少甞為士耳注未明悉僕射領北門謂河東帥嚴綬也注承洪譜之誤唐以太原為北門屢見於史田季安時鎮魏博不當言北門至宋都大梁始以魏地為北門如㓂萊公鎮魏自言北門鎻鑰非凖不可是也洪説失之又唐河東帥府兼統蕃部觀公作鄭儋墓誌可見故下繼以盛徳之句答張徹日月垂十齡按公此詩發端云首叙始識靣而其下以浚郊避亂睢岸連居為識靣之始則知公與徹邂逅在貞元十五年已夘去汴居徐之日至丙戌凡八年故曰垂十齡也若從丙子訖元和改元之歲已踰十載與詩語不符矣淚眥還雙熒注按公詩叙朝正畢與徹相别惟畢事驅傳馬二聨言已歸彭城而徹留長安省選以下四句又另叙十七年以後事公赴省謁選者再至十八年春始有四門博士之授省選逮投足者謂此也公謁選入都復與徹相聚及公得官而徹方下第且有逺適故繼以塵袪淚眥二語皆惜别之詞舊注通指為十六年事非也漸階羣振鷺注按揚雄劇秦美新云振鷺之聲充庭鴻鸞之黨漸階又韓詩振鷺篇于彼西雍薛君章句曰鷺潔白之鳥西雍文王之雍言文王之辟雍學士皆潔白之人則漸階句語本揚子而義取韓詩盖與下句並切太學言之也又注引法言釋螟蛉是矣而肖之矣下删速哉七十子之肖仲尼也十字則學誨之義晦矣薦士妥帖力排奡妥帖二字本陸士衡文賦使以歸期告按公薦東野於鄭餘慶當在元和初若貞元十九年餘慶方在郴州貶所不得有此薦也感物増戀嫪注聲韻云姻嫪説文云固也按韻當作類姻固二字並當作婟古風題注貞元之季人主方瀆貨外吏多掊克以事進奉有稅外方圓之目科率日多民力重困公詩殆以是時作史記平凖書云告緡獄興商賈中家以上大率破民偷甘食好衣不事畜藏之産篇末四語意盖本此嗟哉董生行生祥下瑞無時期按時當從宋閩本作休汴州亂題注首章意乃公羊子所云下無方伯次篇則上無天子也利劍題注按此詩歲月無可考詳味詩意似為疾䜛而作與汴州事無渉又孟東野送公從軍詩中有行為孤劍咏句疑指此詩從軍盖公初赴汴幕時也汴泗交流東坡文彭城三靣阻水樓堞之下以汴泗為池此詩張僕射有和篇其末云韓生許我為斯藝勸我徐驅作安計不知戎事竟何成且愧吾人一言惠盖撃毬之事雖不為即止亦深以公言為有當也鳴雁公在徐幕時有與李習之書云僕於此豈以爲大相知乎將亦有所病而求息於此也違憂懐惠即有病求息意桃源圖題注武陵太守當是竇常常兄弟五人並以詩擅名有聨珠集行世元和十年常為朗州刺史朗州唐武陵郡之官寄劉夢得詩栁子厚和之見栁集中韓有岳陽樓别竇司直庠詩及竇司業牟墓誌二人皆常之弟常之刺朗亦見牟誌又朗州至宋因避聖祖諱改為鼎州南宫先生疑是盧虞部汀韓盧倡和甚多詳見本集臨卭韓本題下注必與一郎官賡和廖本改郎官為禮部郎非也尚書諸曹唐代統稱南宫盖猶云南省不專指禮部如和虞部赤藤杖詩稱虞部為南宫即其証也八月十五夜贈張功曹滌瑕蕩垢按揚雄文滌瑕蕩穢謁衡岳廟令老人按唐制五岳四瀆令各一人正九品上掌祭祀此廟令盖謂衡岳廟中令也古意題注據宋建安魏本自公縣齋有懐以下皆樊氏澤之語又自仲尼悲麟至微沈子幾晦哉悉樊氏引沈顔登華㫖之文也此下更有按公諸詩及國史補所云公實如此初無他㫖也四語盖顔自詫得詩微㫖而樊氏深不然之故力辨其非廖瑩中昧於文義輒删樊説四句全失其本意矣顔吳郡人傳師之孫唐末進士仕吳為翰林學士登華㫖篇文苑文粹並載憶昨行陽山鳥道出臨武注按江南乃湖南之誤又連屬廣南此宋制也唐則郴連並隸湖南宋朱新仲猗覺寮雜志云韓詩驛馬距地驅頻隤蜀人謂立地為拒地立地者不容少休意按蜀人方言如土銼岸溉之類屢見杜詩盖少陵久寓蜀地故旅中所咏即用土人語耳韓子陽山之行路不由蜀何故忽採方言入詩乎漢書甘延壽傳䟦距注云有人連坐相把據地而能㧞取之拒地之拒殆與距同夫人以手據地可曰距則馬以足躆徐廣史記注躆與據同謂以足據持之地亦可言拒矣韓子時從臨武踰嶺南出經鳥道之險驛馬力疲足倦據地不前策之而猶不能升故曰驅頻隤正取虺隤義也近者三姦悉破碎按三姦斥伾叔文執誼李軌法言注謂三桓陳恒王莽也故公永貞行云天位未許庸夫干盖直以窺覦神器之罪坐諸人又篇中侯景九錫語其意亦同後人讀至此亦不能無嘻其甚矣之疑也君當先行我待滿按公詩意方欲與張君結隠嵩洛間所謂君當先行者即䝉上投檄北去言之耳此與寒食出游詩皆叙張方有邕管之辟並未及雍掾之除盖此時張之新命尚未下也注誤從此直到耉與駘注詩中耉字别本有作耆者故有閟宫以下十三字注今正文既作耉此注當削昨者宋本作昨日則以下八句似謂是歲八月朔順宗内禪之赦及細考之非也唐制赦書日行五百里計旬餘即可逹郴州功曹以是月十四日在郴聞赦理或有之但觀州家申名使家抑句時使府駐潭州自郴申潭文移往復其事豈一二日可了乎則作昨日自誤也又洪譜亦謂此指憲宗受禪之赦不知憲宗受禪無赦至踰年改元始頒赦耳其考尤疎劉生詩倒心回腸為青眸按青眸即指上歌舞之人公感春詩云豔姬踏舞筵青眸刺劒㦸可以互證倒心回腸言劉生目成意移耳為當讀去聲且注不引宋玉高唐賦感心動耳回腸傷氣之文而舉司馬遷書既屬蔓引至採阮籍青眼事尤誤鄭羣贈簟首句注按笛當作簟蘄州貢簟見唐史地理志故曰天下知游青龍寺贈崔補闕去歲羈帆注按注乃採樊氏語而江陵下删原文竢命於湘中一句則與本句湘水不相闗矣年少按補闕十七登第少公八歲元和初列官諫署年方踰壯故有年少得途句贈崔立之評事題注按公答崔立之書首稱斯立足下盖字斯立而名立之也注誤勿嫌法官未登朝立之貞元中登第後復中詞科初授校書郎秩滿除畿尉當時相傳畿尉有六道入為御史評事京尉者有佛道仙道人道之分見崔琬御史臺記京尉即赤尉謂長安萬年二赤縣也勿嫌法官二句盖言立之自畿尉召入止遷評事不得御史但比赤尉尚有仙凡之異耳盖除御史則登朝為常參官矣唐常參官一名登朝官本巻後有酬崔十六少府攝伊陽尉乃别是一人非斯立也斯立行二十六亦見韓詩與少府之行異又少府以赤尉攝伊陽令未甞為伊陽尉伊陽為畿縣非赤縣注全誤錢帛縱空衣可凖唐百官月俸多給錢帛縱空謂官閒禄薄也摵摵井梧注潘岳秋思賦按思當作興哭楊兵部題注知當作刺知州之置自宋始唐無此官又李習之陸歙州述言云言字衍赤藤杖歌滇王掃宫避使者注當如避道之避按如下脫避舍二字崔十六少府攝伊陽題注按詩意言己新居洛下而崔以赤尉繼至遂與鄰居則公與崔相識在元和二年分教東都後非自江陵召入時也河南洛陽二赤縣皆在東都郭下崔之攝伊陽盖以赤尉權畿令也送侯叅謀題注按公以國子博士分司東都至是已三載詩云幸同學省官又云東司絶教授盖與侯並為分司官也已而公除都官郎分司如前而侯則往應河中之辟注未明曉人馬何蹻騰注馬逝也按逝當作壯感春第三首放車載草農事濟按時討王承宗於恒州配河南府饋運車四千兩河南尹房式以凶旱人貧難以徴發憲宗可其奏放車載草指此事也起居諫議注按裴度為河南功曹西川節度使武元衡奏辟掌書記尋自蜀召為起居舍人非從河南入也注仍洪譜之誤方氏増考已辨之矣送李翺題注四年正月已酉按下文是月有乙未丁酉則其前不合有己酉當是乙酉之誤送石處士常山險猶恃按公送石處士序云方今冦聚於恒師環其疆恒州成徳軍治所也時方討成徳帥王承宗中尉吐突承璀統行營兵駐邢軍久無功故有鉅鹿師欲老二句邢州唐亦稱鉅鹿郡屬昭義軍先是承璀兵深入成徳境為承宗所挫故退屯於邢當石洪赴河陽時尚未有洗雪承宗詔故曰去去事方急也注引赦承宗事誤招楊之罘食有肉與魚注馮讙遷之幸舍按當作遷馮讙幸舍寄盧仝獨抱遺經究終始按晁氏讀書志唐盧仝春秋摘微四巻祖無擇得之於金陵崇文總目所不載獨抱遺經句殆指是書言之惜其不傳也韓集㸃勘巻一
