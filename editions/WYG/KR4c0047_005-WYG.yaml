body:
  text: 書後近代吳中徐氏東雅堂堂主人徐時泰萬厯中進士歴官工部郎中後崇禎末堂已易主項宫詹煜居之煜後以降流賊名麗丹書里人嘇而焚其宅堂遂燬于火今僅存池塘遺跡而已刋韓集用宋末廖瑩中世綵堂本其注採建安魏仲舉五百家注本為多間有引他書者僅十之三復删節朱子單行考異散入各條下皆出瑩中手也瑩中為賈似道館客事迹見宋史似道傳其人乃粗涉文藝全無學識者其博採諸條不特遴擇失當即文義亦多䟱舛閲者但取魏本及考異全文互勘得失立辨矣瑩中之敗在徳祐元年則書出徳祐前可知徐氏刋此本不著其由來殆深鄙瑩中為人故削其氏名并開板歲月耶今世綵堂韓集與瑩中所輯似道恱生堂禊帖並為世所希有矣廖為閩中著姓世有眉壽高曽多及見曽𤣥故以世綵名堂朱子髙弟廖子晦亦其裔也至於瑩中遂以相門狎客隤其家聲而猶遵奉朱子之書盖先世之緒言猶在不敢㤀淵源所自也雍正丁未春日長洲陳景雲書
