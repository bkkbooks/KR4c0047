body:
  text: 韓集㸃勘巻四長洲陳景雲撰烏氏廟碑盧從史始立議按漢書鄒陽傳羊勝公孫詭欲使梁王求為漢嗣袁盎等皆建以為不可師古曰建謂立議則立議猶言建議也或以立字斷句非至馬都山按樊氏所謂或者之論皆温公考異中語盖温公所見韓集乃祥符杭本其文作走可突干渤海上至馬都山渤海下無擾海二字與今本不同故公云爾至謂公未見許碑樊説是也唐平盧一鎮分契丹渤海之間契丹在平盧西北而渤海在其東馬都山當是平盧東境與渤海接壤之地又唐以平盧帥兼領海運事自承玼既却渤海之兵於是東陲息警運道無虞故歲罷運錢以千萬計也石嶺軍使按石嶺軍在河東忻州秀容縣因屯軍邉地故有積粟厲兵出入畊戰事若左領軍則職典禁旅不當有下二語且左領軍止有將軍無軍使或本自誤也河東節度使鄭公神道碑自號白雲翁按令狐楚表奏十巻盖集前後佐桂林太原二府事四帥幕下所草非專為鄭儋從事時作也初桂帥王珙奏辟楚楚以父官并州不得奉飬未甞預帥府燕樂滿歲謝歸太原諸帥皆髙其行相繼引入幕府及後表奏之編自佐桂林幕府始自號白雲孺子盖用狄梁公登太行遥望并州親舍事方氏媚儋之誚恐承小説之失實也田氏先廟碑銘勿亟勿遲按春秋桓公八年春正月己夘烝公羊傳曰譏亟也注亟數也釋文音去冀反勿亟義本此或讀居力反作急字觧者非可作承輔按漢書淮南衡山王不務遵蕃臣職以承輔天子劉統軍碑以勢自憚按劉除陳州由佐新帥上官説却蔡兵之功元侯即謂新帥言劉之威名本在節使上而能盡廵属之禮以事大府故曰以勢自憚也注引韓全義事殊誤峻之大夫按峻猶陟也張説平貞眘碑銘云嚴嚴憲府公三峻之與此同作浚非及癸已歲按統軍以元和八年五月許州水災事徴還六月歸第至冬而卒秋涌水出之秋字定傳録誤况下文明云六月隆熱則上不應言秋尤明矣清河郡公房公墓碣字某按啟字開士見劉夢得集人吏迎觀望見按天寶末房太尉為扶風郡守郡後改鳯翔府當其孫為此府參軍時乃祖故吏民定尚有存者故云太原郡公神道碑興官耆事按耆與嗜同王介甫葛度支墓銘有樂職嗜事語正用韓文尤可證明朱子之説曹成王碑救兵州東北属鄉還按兵州文章正宗作其州為是盖䝉上梏其州之文謂隨州也属鄉方本作厲鄉與唐史合舊史曹王皋令伊慎撃李希烈兵於随州厲鄉大破之按漢書地理志南陽隨縣下注厲鄉故厲國隨縣在唐為隨州故九域志云厲鄉隨州村名盖本漢志朱子言當作属鄉盖從嘉祐杭本又言厲鄉属亳雖本史記老子苦縣厲鄉曲里人注然曹王戰處乃隨之厲鄉非亳境也又權徳輿伊慎碑引兵攻隨走康叔於厲鄉康叔李希烈所遣將也盖曹王遣慎撃走希烈兵之在厲鄉者故曰救耳權韓两碑尤可互證又自􅞌隨光化以下五句皆叙取隨州事無及安州語朱子去安尚逺之説亦非扶風郡夫人墓誌司徒侍中莊武公之冡婦按侍中二子少府其次也則盧夫人乃介婦今云冡婦未詳或疑少府是嫡子故云爾然以公少府兄行狀考之盖同母無嫡庻之異也長子後注按繼祖乃徳宗賜名事見李肇國史補則少監誌云諱繼祖非有誤也朱子之説誤秘書少監獨孤府君墓誌按誌言君生之年憲公殁世則始生而孤明矣注二歲語誤秘書兄朗舊史誤以為弟新史已正之盖據公誌誌言上將有所相不可於衆謂裴均也不著其姓名盖縁均帥江陵時公甞在幕府以故吏為府主諱耳與秘監同諫之李約其斥均之辭甚醜見新史均傳但史誤以為徳宗時事亦當據公誌正之秘監妻權夫人以夫殁之歲十月卒其父文公作誌言子誨生十年即此誌之天官也誌以四月作盖其時猶未命名故稱其小名耳本傳及世系表皆言名庠必又後來所改也虞部員外郎張府君墓誌孝權大父注誌言大父諱孝先注或作奉先按或本是也唐人重家諱不應犯祖名衛府君墓誌贈太子洗馬諱某之孫注方氏増考年譜云此誌今本皆作衛之𤣥及質之善本實中立非之𤣥中立字退之所謂善本即汪彥章所據王仲信本也方氏又云中立餌竒藥求不死而卒死故白樂天謂退之服硫黄一病訖不痊孔毅夫陳無已之徒皆指以為公晚年惑金石藥非也觀白氏所紀退之微之杜子崔君三四人皆非有聞於時者適以中立之字偶同耳其説最辨而核詳見慶元魏本所刋韓文類譜中廖瑩中集諸家之説採魏本為多方氏此條獨在所削且於李博士誌後復引孔陳云云盖反以為篤論矣河南令張府君墓誌抑首促促注按注上齪字當作齷應劭漢書注喔􅐅急促貎􅐅即齪也二字非特音同其義亦一帥他遷注李鄘為江東節度使江東當作河東劉統軍墓誌父訟注父訟或作父誦朱子謂名訟無理疑避諱而改然後漢有司徒尹訟見段熲傳是古人已有名訟者鳯翔節度使李公墓誌宿衛四十餘年按李公以建中四年扈蹕立功及元和六年自金吾出鎮其居宿衛二十餘年耳四字傳録之誤平淮西碑題注按羅隠記石烈士事此碑立於蔡州及仆碑磨文後段文昌重撰其文云勒銘淮浦尤明證也後州人以裴晉公督師平蔡特立廟其地兼移叚碑於廟庭至宋政和中州守陳珦因謁晉公廟讀碑文大不平即磨去之重刻韓文事見夷堅志先是祥符間吳興姚鉉輯唐文粹採文昌作而置韓碑陳姚二事前後相反如此題下注愬妻唐安公主也按公主下脱女字稂莠不薅按薅當從詩釋文讀呼毛反遂定易定注義成節度使張茂昭按義成當作義武義成乃鄭滑軍號非易定二州地今益以汝注徙𨽻汝州按𨽻當作理河陽軍本治盟津今移軍駐汝惟是朔方注按陜州属陜虢觀察使所轄非東川地注誤元濟盡并其衆注騎軍按據史騎當作騾其往撫師按漢書李廣傳司馬法曰振旅撫師以征不服凡兹廷臣注按判官書記下孫氏原注有皆朝廷之選上皆從之判官謂李正封馮宿書記謂李宗閔不著三人姓名注仍史文之舊也廖本删此二語是直以判官書記之職皆行軍司馬一人兼為之䟱舛甚矣河南附起注按汴當作鄆時鄆帥李師道方與蔡冦相首尾與汴無渉又統諸軍討蔡者即汴帥韓𢎞也三方分攻注按三方分攻即上所謂道古攻其東南文通戰其東愬入其西也三方中即已伏後西師之根矣至大軍北乘二句始詳叙顔𦙍武合攻其北之事自常兵時曲至郾城來降乃挈前文大戰十六得栅城縣二十三之要而言之試之新城二句則所謂顔𦙍武合戰益用命也自是賊勢日蹙專備北境故西師得成搗虚之功西師句尤與上分攻相應細尋文義舊注之滅裂自見矣南海神廟碑題注觀察使當從方氏舉正使上増支字支使之職與書記同公鄆州溪堂詩序作於此碑後中有從事陳曽當即是人盖旋去桂幕而從事於鄆也來享飲食注享或作慕按慕當作簒揚子法言簒取也此簒字所本古本揚子亦有誤作慕者盖两字相似易訛也羅池廟碑侯之船兮两旗五句按舟中樹两旗設寓馬以迎神此嶺外祀神舊俗見南宋臨卭韓本注盖侯船及乘駒諸句皆紀其實也東坡書此詩泊之作汩之然似從集為長盖因中流阻風停橈故有待侯不來之悲耳北方之人兮二句此言中原士大夫方多騰口吹毛者也據唐史子厚從永州召還復有嶺外之行盖深為言路所排所謂為侯是非者此也北一作此為一作謂皆誤宋丘崇重修羅池廟記略云栁侯祠羅池三百餘年英靈猶存元祐五年賜額曰靈文廟崇寧三年賜爵曰文惠侯承糦踐籩袂甞相属所謂施利錢者歲不知幾何率以十萬為公帑用餘則廟得之以備營繕此記乃政和初作施利錢即後代香錢也至紹興末加封文惠昭靈侯致和元年又進封文惠昭靈公見元史盖栁侯著靈南土州人祀之久而益䖍碑文所謂欽於世世者信矣江南西道觀察使王公神道碑公字𢎞中按法言修身篇或問士如何斯可以禔身曰其為中也𢎞深王公字本此按仲舒連州之謫乃為同列所擠同列者韋執誼也時雖在郎署方承恩用事故得逞其私與王叔文無預許國公神道碑恒無宿儲祥符本無恒字為是見舉正碑作於長慶中應避御名京兆尹時韓方尹京監䕶喪事者即公也故公祭韓令公文中有云錫秘物之必周余將命而臨視是也祭文乃門人沈亞之代作亞之時為櫟陽尉京兆属邑也栁子厚墓誌勇於為人按為當讀于偽反鄭康成詩箋云為猶助也史言王叔文宻結栁劉諸人定為死交勇於為人即言子厚黨助叔文而微其辭也不自貴重顧藉按顧藉之義與顧惜同公上留守相公啟云無一分顧藉心是也或以二字属下非八司馬初貶有永不量移之命後八人中惟程异以大臣李巽力薦復得進用位登宰輔可謂有鉅力推挽矣然物望素輕殁於相位旋即身名俱滅視子厚之以文章傳世百世不磨者所得孰多耶异先子厚卒當韓誌栁墓時正两人盖棺論定之日故誌中云云似專為异而發也太史公有言富貴而名磨滅者不可勝記惟倜儻非常之人稱焉韓子之軒輊栁程猶斯志也國子司業竇公墓誌題注按送竇從事序中稱殿中侍御史者盖先是司業佐留府之官也誌中明言佐六府五公八遷至檢校虞部郎中則前此使府所歴官具在其中矣注何以不載為疑耶為郎官令守按郎官虞部都官郎也令守洛陽令澤州守也守字句絶又前鄭羣墓銘已有郎官郡守語正與此同考異欲乙令守二字則當属下慎法為句恐非尚書左丞孔公墓誌不能進退郎官按唐制郎官有缺左右丞舉之亦有已在郎署而為丞所汰且甫除而丞不放入省者是郎官進退丞皆得主之故戣自以不能舉職為嗛也殿中少監馬君墓誌按公以貞元三年至京師是夏平凉有吐蕃刼盟事公兄御史弇遇害始主和戎之議者馬燧也公見燧殆在刼盟後燧念弇新殁王事故撫䘏公者特厚耳玉雪可念注王丞相下當有夫人二字見世説注幽州節度判官張君墓誌銘自申於闇明按張平子靈憲中論日之明云由明瞻闇闇還自奪韓子語似本此太學博士李君墓誌司空之後注後文當作孝文胥其出注廉頗當作趙奢年四十八注按長慶三年歲在癸夘干以癸夘卒年四十八則其生當在大厯十一年丙辰非元年也又誌既載卒之歲月及得年若干則始生之年自見此注尤贅廣川書䟦云李干誌李翺書誌云干字子漸韓集無此按子漸之字當取鴻漸於干義其名從干為是毛頴傳宋王象之輿地紀勝云中山在溧水縣山出兎豪為筆最精韓文毛頴傳中中山謂此按中山兎毫亦見白樂天雞距筆賦白又有紫毫筆詩則云貢自宣城以新史地理志叅証宣州貢筆與詩語合而溧水則宣之属縣也則宣城之貢即出自中山明矣但當秦始皇時楚郡壽春在江之北而溧水中山則江南地秦未克楚都其兵不得先渡江而南朱子所謂雖寓言而不能無失者殆謂此也鱷魚文將其醜類按定四年傳將其醜類注醜衆也文末年傳注醜類惡物也太傅董公行狀其子乃復欲為士寧之故按乃當從唐史作廼李萬榮子名也乃廼雖同而字有今古之異諸注家不注萬榮子名盖皆誤以為虚字而略之耳薦侯喜狀題注鬰為選首者盖州家牒送舉進士之首如張籍舉進士由汴州牒送是其証也汝州刺史領防禦使不𨽻大府故亦得舉士按盧䖍終秘書監從史之父也為裴相公譲官表又毗邦憲注按元和十年晉公以中丞兼刑部侍郎故曰又毗邦憲非别除也注中為字當作兼舉錢徽自代狀按集中舉人自代狀凡六篇此其一也餘五篇皆先具新除之官於前如國子監尚書兵部之類此狀乃除刑部侍郎時進首行狀字下當有尚書刑部四字盖偶脱耳常參官上後三日舉一人自代諸州刺史亦如之皆建中制也以韓子歴官言之如御史職方比部考功中書舍人兵部侍郎及两任吏部侍郎皆當有舉人自代狀而集止有六狀盖逸者已大半矣惟都官之除時方分司東都尚未入省不當輒舉自代人耳又刺袁潮二州止有袁州舉韓泰自代狀而潮州舉狀亦逸之當時雖左降官蒞州亦例舉人自代如栁子厚集中有栁州舉自代人狀即其証也舉張正甫自代狀按長慶中正甫為尚書右丞駁于頔更諡事見頔傳中其剛直可知事在公舉自代後論鹽法狀今臣計其新法亦用十萬不啻按啻字句絶不啻猶言不止也左傳鮮不五稔杜注少尚當歴五年多則不啻又栁子厚序棊亦有相去千萬不啻語海水題注公登第後未甞還江南不知注説何據贈崔立之題注按正集有酬崔少府詩乃别是一人非崔丞也又少府行十六與崔丞行二十六又不同注誤上崔虞部書儳焉而不終注白頭而新按漢書鄒陽傳作如新董説盖本新序非誤也通解必謂偏而不通者矣按此句下脫其可不謂之大賢者哉一句當從宋閩本増河南府同官記題注此記洪譜繋於元和四年朱子於本傳附注從之盖記中既五年句乃合永貞元年言之上下文義甚明此注中元和五年當作四年又既五年注當削開府漢陽注按均入為僕射後加同平章事出鎮㐮陽記中两稱宰相以其新命言之也僕射不為正宰相自唐中葉後已為定制今注脱其加使相事似未明悉歲時出旌旗按東都留守其之官例賜旗甲見唐史吕元膺傳出旌旗城外衙之即謂出所賜旌麾也潮州請置鄉校牒無所從學爾考異云爾或作耳非是按爾字若作語助句絶與耳字無異公他文中亦有爾耳二字两本互異者考異但並存而已今由朱子作耳非是語推之此爾字似當作爾汝之爾属下句讀盖此牒即授趙徳秀才故云然也如公上張僕射書云受牒之明日亦是受署幕職文牒耳又韋執誼貶崖州司户刺史請攝軍事衙推有勿憚縻賢之牒此尤刺史署衙推即牒其人之明証元稹草陳諫除官制中有爾諌語與此牒中爾徳類盖當日自有此文體順宗實録巻一太常卿許孟容譔議文按議似當作誄巻二追故相忠州刺史陸贄按陸相貶忠州别駕卒於貶所未甞有刺史之授詳見實録第四巻此刺史二字誤巻三五坊小兒按南部新書五坊使者鵰鶻鷹鷂狗謂之五坊置使分領之若小兒則又以小閹分𨽻五坊而給本坊役使者也張薦卒於赤嶺東廻紇辟按舊史張薦使吐蕃至赤嶺東被病殁於紇壁驛吐蕃傳其柩以歸此廻紇辟乃傳録之誤巻四以尚書左丞韓臯按新史方鎮表元和元年始升鄂岳觀察為武昌軍節度使當順宗世鄂岳未甞為節鎮武昌軍節度使六字疑衍六月乙亥按舊史順宗紀是年七月戊辰朔乙亥乃七月八日也六月無乙亥一本作己亥為是又一月中前有乙亥後不當有癸丑以下文癸丑推之乙亥之誤益明贈故忠州别駕陸贄按追贈陸贄陽城事不繋月日以舊史考之乃七月丙子盖日月並脱也又潘孟陽除官之命乃戊寅非戊午七月亦無戊午並當以史為正議者言叅死由贄注按贄請令長舉属吏狀長下脱官字巻五貶韋執誼崖州司馬按新史宰相表執誼之貶在是冬十一月又司馬新舊史執誼傳並作司戸而本紀及宰相表作司馬與實録同當是自司馬再貶司户猶劉栁諸人初貶刺史再貶司馬耳又劉栁等七人但謫逺州無一過嶺者而崖州之貶獨再涉鯨波所竄之地視諸人為最惡宜降秩尤卑紀表苐舉其初貶之官故與本傳互異又執誼至崖州刺史李甲牒攝牙推事盖縁司户與牙推皆州幕官故可牒之兼攝若司馬乃州之上佐刺史不得牒署矣此亦執誼再貶司户之証張萬福元和元年卒按前書萬福卒係六月己亥之後但未書日耳則其卒之年月已詳元和元年四字乃衍文永貞二年正月景戌朔注按順宗之崩在正月甲申則此月之朔非景戌也戌作寅為是飲城南道邉題注按題中既不著中丞之姓又無他事可證何由知其為晉公此注當削本傳終秘書郎注已詳疑已誕之誤王性之有博洽名然其雜著中往往語涉齊諧此説亦近之調四門博士注以公博士之除在十七年證洪樊二譜之説最為辨悉按公十七年與楊敬之書有僕守一官且不足以修理語是必在已授博士後益可証公為博士非十八年也權知國子博士注在江陵有答張徹詩按答張徹詩乃公從江陵還朝官國子博士日作非在江陵時也華陰令栁澗注郎中當作郎官轉考功注竄走當作竄定進中書舍人注去年冬按洪譜原文作九年為是韓集㸃勘巻四
