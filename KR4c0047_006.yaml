body:
  text: 清故文道先生墓志銘吾吳昔多博聞好古砥節勵行之碩儒本朝百年來位不大而名最著者則有義門何先生何先生及門無慮數百人其最相契如晦翁之於蔡季通呼為老友者是為少章陳先生自何先生殁後先生獨以名德見推為中吳文獻之重輕者幾三十年乾隆十二年十月十三日以疾卒於家典型凋謝逺近為之嗟嘆卜葬有日故人門弟子咸謂先生有道而文宜按古私諡之義諡曰文道先生其孤具狀徴銘於余按狀先生諱景雲少章其字先世家常熟代有聞人所謂河東陳氏也自曽大父天麟始遷郡城大父明義喜藏書深禪理多與明季遺民故老游父治昌慷慨尚義拯人之急母朱孺人先生生而頴異初就孰時同孰諸兒所課皆能背誦年十七睢州湯文正公撫吳試士拔置第一十九從義門先生游益講求通儒之學窮究經史晝夜無間學遂大殖父喪服闋補吳江縣學生康熙癸酉試京兆不售而歸再至京館藩邸三年復辭歸時年甫四十以母老遂絶意宦游後藩邸再遣使敦促漕帥赫公命淮安守造廬延請皆堅謝不赴此先生出處不茍之大略也其為學如飢渴之於飲食終日丹鉛不離手凡經史四部書從源及委貫串井然地理制度考據尤詳下及稗官說家無不綜覽而尤深於史學早歲溫公通鑑略能成誦前明三百年事談之更僕不倦若身列其間能剖决其毫芒得失者為文章簡嚴有法所著有讀書紀聞十二卷綱目訂誤四卷兩漢舉正五卷國志舉正四卷韓集㸃勘四卷栁集㸃勘四卷文選舉正六卷通鑑胡注舉正十卷紀元要略二卷文集四卷皆能有功前哲嘉惠後來其他少時帖括之文及應聘所修通志等書非先生所留意故不復紀也性孝友居父母憂每慟輒絶歲時祭享必涕泗沾衣與人交有始終外和內剛不因人熱所居老屋數楹朝虀暮鹽人不能堪處之怡然晚歲名益高迹益晦終年杜門足不踏塵市蓋先生視世絶少可語世亦鮮知之者所謂不食之碩果讀書之種子豈與世之工鞶帨營華膴者爭一時之得失哉享年七十有八配吳孺人吳江兩司寇後諸生景槐女劬躬守約奉姑至孝雍正十年先卒年五十子男二升長洲縣學生黃中吳縣學生入國子監女一歸國子生張爾朴孫男四慶曽文雍文寬慶餘以十三年正月草四日葬於吳山北麓之新阡奉吳孺人祔黃中為人耿介博學有文為先生克家子以余不能取容當世顧獨重焉余雖不獲親炙先生然與其子交深且久遂不敢以不文辭銘曰惟道與文立德立言於時不偶於古獨肩彼富貴者磨滅忽焉先生有書後世永傳吳山之麓鬱鬱新阡我銘幽宫徴在萬年虞山後進王峻頓首拜撰
